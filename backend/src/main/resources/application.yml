  jwt:
    secret: "iskoolSuperSecretKeyForJwtTokenGeneration2026LeanquitousProductionGradeKey"
    expiration-ms: 86400000
  s3:
    access-key-id: "${AWS_ACCESS_KEY_ID:}"
    secret-access-key: "${AWS_SECRET_ACCESS_KEY:}"
    region: "${AWS_REGION:ap-south-1}"
    bucket-name: "${AWS_S3_BUCKET:iskool-assets}"
    base-url: "${AWS_S3_BASE_URL:https://iskool-assets.s3.ap-south-1.amazonaws.com}"
