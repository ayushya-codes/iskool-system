server:
  port: 8080

spring:
  application:
    name: iskool-backend

  datasource:
    url: jdbc:postgresql://db.mumzfacpxfaadlmcjfkr.supabase.co:5432/postgres
    username: postgres
    password: qjrJL1QiGizK8wQZ
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc.batch_size: 20
        default_batch_fetch_size: 20
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

iskool:
  cors:
