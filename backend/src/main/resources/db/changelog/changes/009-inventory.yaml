databaseChangeLog:
  - changeSet:
      id: 009-01-inventory_items
      author: leanquitous
      changes:
        - createTable:
            tableName: inventory_items
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: category, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: quantity, type: INT, constraints: { nullable: false } }
              - column: { name: low_stock_threshold, type: INT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 009-02-indent_requests
      author: leanquitous
      changes:
        - createTable:
            tableName: indent_requests
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: item_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: category, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: quantity, type: INT, constraints: { nullable: false } }
              - column: { name: priority, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
