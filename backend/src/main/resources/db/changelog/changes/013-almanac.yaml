databaseChangeLog:
  - changeSet:
      id: 013-01-prayers
      author: leanquitous
      changes:
        - createTable:
            tableName: prayers
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: title, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: language, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: text_content, type: TEXT }
              - column: { name: audio_url, type: VARCHAR(1000) }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 013-02-almanac_remarks
      author: leanquitous
      changes:
        - createTable:
            tableName: almanac_remarks
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: remark, type: TEXT, constraints: { nullable: false } }
              - column: { name: remark_date, type: DATE, constraints: { nullable: false } }
              - column: { name: remarked_by_user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
