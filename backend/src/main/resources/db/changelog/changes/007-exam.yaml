databaseChangeLog:
  - changeSet:
      id: 007-01-exams
      author: leanquitous
      changes:
        - createTable:
            tableName: exams
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column: { name: school_id, type: BIGINT }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: exam_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: exam_date, type: DATE, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 007-02-exam_portions
      author: leanquitous
      changes:
        - createTable:
            tableName: exam_portions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column: { name: school_id, type: BIGINT }
              - column: { name: exam_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: portions, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: exam_portions
            columnNames: school_id, exam_id, subject_id
            constraintName: uk_exam_portions

  - changeSet:
      id: 007-03-exam_results
      author: leanquitous
      changes:
        - createTable:
            tableName: exam_results
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column: { name: school_id, type: BIGINT }
              - column: { name: exam_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT, constraints: { nullable: false } }
              - column:
                  name: marks_obtained
                  type: DECIMAL(6,2)
                  constraints:
                    nullable: false
              - column:
                  name: max_marks
                  type: DECIMAL(6,2)
                  constraints:
                    nullable: false
              - column: { name: grade, type: VARCHAR(10) }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: exam_results
            columnNames: school_id, exam_id, student_id, subject_id
            constraintName: uk_exam_results

  - changeSet:
      id: 007-04-grading_schemes
      author: leanquitous
      changes:
        - createTable:
            tableName: grading_schemes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column: { name: school_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: grade_label, type: VARCHAR(10), constraints: { nullable: false } }
              - column:
                  name: min_percentage
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: max_percentage
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: grading_schemes
            columnNames: school_id, grade_label, min_percentage
            constraintName: uk_grading_schemes

  - changeSet:
      id: 007-05-rank_lists
      author: leanquitous
      changes:
        - createTable:
            tableName: rank_lists
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column: { name: school_id, type: BIGINT }
              - column: { name: exam_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: class_rank, type: INT }
              - column: { name: section_rank, type: INT }
              - column: { name: school_rank, type: INT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: rank_lists
            columnNames: school_id, exam_id, student_id
            constraintName: uk_rank_lists

  - changeSet:
      id: 007-06-report_cards
      author: leanquitous
      changes:
        - createTable:
            tableName: report_cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: file_url, type: VARCHAR(1000), constraints: { nullable: false } }
              - column: { name: is_approved, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: approved_by_user_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: report_cards
            columnNames: school_id, student_id, batch_id
            constraintName: uk_report_cards
