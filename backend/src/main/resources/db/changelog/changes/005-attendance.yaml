databaseChangeLog:
  - changeSet:
      id: 005-01-attendance_records
      author: leanquitous
      changes:
        - createTable:
            tableName: attendance_records
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: date, type: DATE, constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: marked_by_faculty_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: attendance_records
            columnNames: school_id, student_id, date
            constraintName: uk_attendance_records

  - changeSet:
      id: 005-02-student_leave_applications
      author: leanquitous
      changes:
        - createTable:
            tableName: student_leave_applications
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: leave_type, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: start_date, type: DATE, constraints: { nullable: false } }
              - column: { name: end_date, type: DATE, constraints: { nullable: false } }
              - column: { name: reason, type: TEXT }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: approved_by_user_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 005-03-faculty_leave_applications
      author: leanquitous
      changes:
        - createTable:
            tableName: faculty_leave_applications
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: leave_type, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: start_date, type: DATE, constraints: { nullable: false } }
              - column: { name: end_date, type: DATE, constraints: { nullable: false } }
              - column: { name: reason, type: TEXT }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: approved_by_user_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
