databaseChangeLog:
  - changeSet:
      id: 006-01-assignments
      author: leanquitous
      changes:
        - createTable:
            tableName: assignments
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: title, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: description, type: TEXT }
              - column: { name: attachment_url, type: VARCHAR(1000) }
              - column: { name: due_date, type: DATE, constraints: { nullable: false } }
              - column: { name: created_by_faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 006-02-assignment_submissions
      author: leanquitous
      changes:
        - createTable:
            tableName: assignment_submissions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: assignment_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: submitted_at, type: TIMESTAMP }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: assignment_submissions
            columnNames: school_id, assignment_id, student_id
            constraintName: uk_assignment_submissions

  - changeSet:
      id: 006-03-rooms
      author: leanquitous
      changes:
        - createTable:
            tableName: rooms
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: room_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: capacity, type: INT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 006-04-class_timetables
      author: leanquitous
      changes:
        - createTable:
            tableName: class_timetables
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: class_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: is_shared, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: is_published, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: class_timetables
            columnNames: school_id, class_id, batch_id, name
            constraintName: uk_class_timetables

  - changeSet:
      id: 006-05-timetable_slots
      author: leanquitous
      changes:
        - createTable:
            tableName: timetable_slots
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: timetable_id, type: BIGINT }
              - column: { name: division_id, type: BIGINT }
              - column: { name: day_of_week, type: INT, constraints: { nullable: false } }
              - column: { name: period_number, type: INT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT }
              - column: { name: faculty_id, type: BIGINT }
              - column: { name: room_id, type: BIGINT }
              - column: { name: start_time, type: TIME, constraints: { nullable: false } }
              - column: { name: end_time, type: TIME, constraints: { nullable: false } }
              - column: { name: slot_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: timetable_slots
            columnNames: school_id, division_id, day_of_week, period_number
            constraintName: uk_timetable_slots

  - changeSet:
      id: 006-06-syllabus_logs
      author: leanquitous
      changes:
        - createTable:
            tableName: syllabus_logs
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: date, type: DATE, constraints: { nullable: false } }
              - column: { name: content, type: TEXT, constraints: { nullable: false } }
              - column: { name: logged_by_faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 006-07-subject_period_requirements
      author: leanquitous
      changes:
        - createTable:
            tableName: subject_period_requirements
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: periods_per_week, type: INT, constraints: { nullable: false } }
              - column: { name: requires_lab, type: BOOLEAN }
              - column: { name: preferred_day_spread, type: INT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: subject_period_requirements
            columnNames: school_id, division_id, subject_id, batch_id
            constraintName: uk_subject_period_requirements

  - changeSet:
      id: 006-08-timetable_generation_requests
      author: leanquitous
      changes:
        - createTable:
            tableName: timetable_generation_requests
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: class_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: generated_by_user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: ai_model_used, type: VARCHAR(255) }
              - column: { name: request_payload, type: TEXT }
              - column: { name: response_payload, type: TEXT }
              - column: { name: error_message, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
