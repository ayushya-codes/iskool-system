databaseChangeLog:
  - changeSet:
      id: 002-01-school_classes
      author: leanquitous
      changes:
        - createTable:
            tableName: school_classes
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: level, type: INT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 002-02-divisions
      author: leanquitous
      changes:
        - createTable:
            tableName: divisions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: class_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 002-03-academic_batches
      author: leanquitous
      changes:
        - createTable:
            tableName: academic_batches
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: start_date, type: DATE, constraints: { nullable: false } }
              - column: { name: end_date, type: DATE, constraints: { nullable: false } }
              - column: { name: is_active, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 002-04-subjects
      author: leanquitous
      changes:
        - createTable:
            tableName: subjects
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: code, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 002-05-terms
      author: leanquitous
      changes:
        - createTable:
            tableName: terms
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: start_date, type: DATE, constraints: { nullable: false } }
              - column: { name: end_date, type: DATE, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
