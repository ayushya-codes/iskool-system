databaseChangeLog:
  - changeSet:
      id: 004-01-faculty
      author: leanquitous
      changes:
        - createTable:
            tableName: faculty
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: employee_id, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: certifications, type: TEXT }
              - column: { name: max_weekly_lectures, type: INT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 004-02-faculty_attendance
      author: leanquitous
      changes:
        - createTable:
            tableName: faculty_attendance
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: date, type: DATE, constraints: { nullable: false } }
              - column: { name: clock_in, type: TIME }
              - column: { name: clock_out, type: TIME }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: faculty_attendance
            columnNames: school_id, faculty_id, date
            constraintName: uk_faculty_attendance

  - changeSet:
      id: 004-03-faculty_availability
      author: leanquitous
      changes:
        - createTable:
            tableName: faculty_availability
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: day_of_week, type: INT, constraints: { nullable: false } }
              - column: { name: available_from, type: TIME, constraints: { nullable: false } }
              - column: { name: available_to, type: TIME, constraints: { nullable: false } }
              - column: { name: is_preferred_slot, type: BOOLEAN }
              - column: { name: notes, type: VARCHAR(1000) }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: faculty_availability
            columnNames: school_id, faculty_id, day_of_week
            constraintName: uk_faculty_availability

  - changeSet:
      id: 004-04-faculty_class_assignments
      author: leanquitous
      changes:
        - createTable:
            tableName: faculty_class_assignments
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: faculty_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: subject_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: faculty_class_assignments
            columnNames: school_id, faculty_id, division_id, subject_id
            constraintName: uk_faculty_class_assignments
