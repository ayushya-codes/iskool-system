databaseChangeLog:
  - changeSet:
      id: 003-01-students
      author: leanquitous
      changes:
        - createTable:
            tableName: students
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: first_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: last_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: date_of_birth, type: DATE }
              - column: { name: gender, type: VARCHAR(50) }
              - column: { name: avatar_url, type: VARCHAR(500) }
              - column: { name: admission_date, type: DATE, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 003-02-student_enrollments
      author: leanquitous
      changes:
        - createTable:
            tableName: student_enrollments
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: division_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: batch_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: roll_number, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: student_enrollments
            columnNames: school_id, student_id, batch_id
            constraintName: uk_student_enrollments

  - changeSet:
      id: 003-03-student_emergency_contacts
      author: leanquitous
      changes:
        - createTable:
            tableName: student_emergency_contacts
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: contact_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: relationship, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: phone_number, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: is_primary, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 003-04-student_medical_profiles
      author: leanquitous
      changes:
        - createTable:
            tableName: student_medical_profiles
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: blood_group, type: VARCHAR(10) }
              - column: { name: allergies, type: VARCHAR(1000) }
              - column: { name: asthma, type: BOOLEAN }
              - column: { name: chronic_conditions, type: VARCHAR(1000) }
              - column: { name: medications, type: VARCHAR(1000) }
              - column: { name: doctor_notes, type: VARCHAR(2000) }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: student_medical_profiles
            columnNames: school_id, student_id
            constraintName: uk_student_medical_profiles

  - changeSet:
      id: 003-05-student_sibling_links
      author: leanquitous
      changes:
        - createTable:
            tableName: student_sibling_links
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: sibling_student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: student_sibling_links
            columnNames: school_id, student_id, sibling_student_id
            constraintName: uk_student_sibling_links

  - changeSet:
      id: 003-06-student_timeline
      author: leanquitous
      changes:
        - createTable:
            tableName: student_timeline
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: event_type, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: event_date, type: DATE, constraints: { nullable: false } }
              - column: { name: title, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: description, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
