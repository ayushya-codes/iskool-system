databaseChangeLog:
  - changeSet:
      id: 011-01-notifications
      author: leanquitous
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: title, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: body, type: TEXT }
              - column: { name: channel, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: sent_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: is_read, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
