databaseChangeLog:
  - changeSet:
      id: 001-01-schools
      author: leanquitous
      changes:
        - createTable:
            tableName: schools
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: logo_url, type: VARCHAR(255) }
              - column: { name: subdomain, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: primary_color, type: VARCHAR(255) }
              - column: { name: secondary_color, type: VARCHAR(255) }
              - column: { name: affiliation_id, type: VARCHAR(255) }
              - column: { name: address, type: VARCHAR(1000) }
              - column: { name: contact_email, type: VARCHAR(255) }
              - column: { name: contact_phone, type: VARCHAR(255) }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }

  - changeSet:
      id: 001-02-users
      author: leanquitous
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: school_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: email, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: password_hash, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: full_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: role, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: mobile_number, type: VARCHAR(255) }
              - column: { name: is_active, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP }
